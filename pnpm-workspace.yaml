packages:
  - "packages/*"
  - "examples/*"
  - "apps/*"

packageExtensions:
  "@huggingface/transformers":
    dependencies:
      onnxruntime-common: 1.24.3

allowBuilds:
  "@google/genai": true
  core-js-pure: false
  esbuild: true
  onnxruntime-node: true
  protobufjs: true
  sharp: true
  workerd: true

# The committed lockfile is reviewed/vetted. pnpm's lockfile re-verification pass
# ignores minimumReleaseAgeExclude, so it would otherwise reject freshly-published
# first-party @kuralle-agents/* entries on every install/run. trustLockfile tells
# pnpm to trust the committed lockfile and not re-gate its existing entries; the
# cooldown still applies when RESOLVING newly-added packages. Requires pnpm >= 11.3.
trustLockfile: true

minimumReleaseAgeExclude:
  - '@mastra/core@1.41.0'
  - '@kuralle-agents/core@0.6.1'
  - '@kuralle-agents/rag@0.6.1'
  - '@kuralle-agents/skills@0.6.1'
  - '@kuralle-agents/core@0.7.0'
  - '@kuralle-agents/rag@0.7.0'
  - '@kuralle-agents/skills@0.7.0'
  - '@kuralle-agents/core@0.7.1'
  - '@kuralle-agents/rag@0.7.1'
  - '@kuralle-agents/skills@0.7.1'
  - '@kuralle-agents/vectorize-store@0.7.1'
  - '@kuralle-agents/core@0.8.5'
  - '@kuralle-agents/rag@0.8.5'
  - '@kuralle-agents/skills@0.8.5'
  - '@kuralle-agents/vectorize-store@0.8.5'
