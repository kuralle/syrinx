app = "syrinx-carrier-spike-mcj-20260529"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile.telephony-spike"

[env]
  NODE_ENV = "production"
  SYRINX_SPIKE_ROLE = "synthetic-carrier"
  SYRINX_SYNTHETIC_CARRIER_HOST = "0.0.0.0"
  SYRINX_SYNTHETIC_CARRIER_PORT = "4180"
  SYRINX_SYNTHETIC_BOT_BASE_URL = "https://syrinx-bot-spike-mcj-20260529.fly.dev"
  SYRINX_TELEPHONY_NETWORK_PROFILE = "jittery"

[http_service]
  internal_port = 4180
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
